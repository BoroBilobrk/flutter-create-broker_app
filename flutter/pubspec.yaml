name: broker_app
description: BRO-KER - Augmented Reality Ceramic Tiling System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # Camera & AR
  camera: ^0.10.8+1
  opencv: ^1.0.0
  image: ^4.1.1
  
  # State Management
  provider: ^6.1.0
  
  # ML & TensorFlow
  tflite_flutter: ^0.10.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # PDF Generation
  pdf: ^3.10.4
  printing: ^5.11.0
  
  # Utilities
  intl: ^0.19.0
  path: ^1.8.3
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/models/
  
  fonts:
    - family: Segoe UI
      fonts:
        - asset: assets/fonts/segoeui.ttf
