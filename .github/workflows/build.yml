name: BRO-KER APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Preuzimanje koda
        uses: actions/checkout@v3

      - name: Postavljanje Jave
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Postavljanje Fluttera
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Instalacija paketa
        run: flutter pub get

      - name: Izgradnja APK datoteke
        run: flutter build apk --release

      - name: Spremanje gotovog APK-a
        uses: actions/upload-artifact@v3
        with:
          name: BRO-KER-App
          path: build/app/outputs/flutter-apk/app-release.apk
          
