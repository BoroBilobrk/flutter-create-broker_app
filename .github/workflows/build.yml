name: BRO-KER APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Preuzimanje koda
        uses: actions/checkout@v4

      - name: Postavljanje Jave
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Postavljanje Fluttera
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Kreiranje Flutter arhitekture
        run: |
          # FORSIRAMO IME BEZ CRTICA KAKO FLUTTER NE BI PUKNUO
          flutter create --project-name broker_app .

      - name: Sigurno dodavanje Android dozvola (Python injekcija)
        run: |
          python -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r') as f: data = f.read()
          perms = '<uses-permission android:name=\"android.permission.INTERNET\"/>\n    <uses-permission android:name=\"android.permission.CAMERA\"/>\n    <uses-permission android:name=\"android.permission.RECORD_AUDIO\"/>\n    <uses-permission android:name=\"android.permission.VIDEO_CAPTURE\"/>\n    '
          data = data.replace('<application', perms + '<application')
          with open(path, 'w') as f: f.write(data)
          "

      - name: Instalacija paketa
        run: |
          flutter pub add flutter_inappwebview
          flutter pub add permission_handler

      - name: Ubacivanje WebView Oklopa (main.dart)
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_inappwebview/flutter_inappwebview.dart';
          import 'package:permission_handler/permission_handler.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await Permission.camera.request();
            runApp(const BrokerApp());
          }

          class BrokerApp extends StatelessWidget {
            const BrokerApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'BRO-KER',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(scaffoldBackgroundColor: Colors.black),
                home: const BrokerWebView(),
              );
            }
          }

          class BrokerWebView extends StatefulWidget {
            const BrokerWebView({Key? key}) : super(key: key);
            @override
            State<BrokerWebView> createState() => _BrokerWebViewState();
          }

          class _BrokerWebViewState extends State<BrokerWebView> {
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                body: SafeArea(
                  child: InAppWebView(
                    initialUrlRequest: URLRequest(url: WebUri('https://borobilobrk.github.io/flutter-create-broker_app/')),
                    initialSettings: InAppWebViewSettings(
                      mediaPlaybackRequiresUserGesture: false,
                      allowsInlineMediaPlayback: true,
                      javaScriptEnabled: true,
                      domStorageEnabled: true,
                      transparentBackground: true,
                    ),
                    onPermissionRequest: (controller, request) async {
                      return PermissionResponse(
                          resources: request.resources,
                          action: PermissionResponseAction.GRANT);
                    },
                  ),
                ),
              );
            }
          }
          EOF

      - name: Izgradnja APK datoteke
        run: flutter build apk --release

      - name: Spremanje gotovog APK-a
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-App
          path: build/app/outputs/flutter-apk/app-release.apk
          
