name: BRO-KER APK Build
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzimanje koda
        uses: actions/checkout@v4
        
      - name: Postavljanje Jave
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Postavljanje Fluttera
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          
      - name: Čišćenje i Inicijalizacija
        run: |
          rm -rf android ios linux macos web windows lib test pubspec.yaml pubspec.lock
          flutter create --project-name broker_app .
          
      - name: Sigurno podizanje Android SDK, Kotlin i Dozvola
        run: |
          python -c "
          p_man = 'android/app/src/main/AndroidManifest.xml'
          with open(p_man, 'r') as f: data = f.read()
          perms = '<uses-permission android:name=\"android.permission.INTERNET\"/>\n    <uses-permission android:name=\"android.permission.CAMERA\"/>\n    <uses-permission android:name=\"android.permission.RECORD_AUDIO\"/>\n    '
          data = data.replace('<application', perms + '<application')
          with open(p_man, 'w') as f: f.write(data)
          "
          # 1. Hardkodiranje SDK verzija za kameru i WebView
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
          sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
          sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle
          
          # 2. POPRAVAK ZA KOTLIN (Glavni krivac za pucanje na 3. minuti)
          sed -i 's/1.8.22/1.9.24/g' android/settings.gradle || true
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle || true
          
      - name: Instalacija Flutter paketa
        run: |
          flutter pub add flutter_inappwebview
          flutter pub add permission_handler
          flutter pub add camera
          
      - name: Ubacivanje Hibridne Arhitekture
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_inappwebview/flutter_inappwebview.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:camera/camera.dart';

          List<CameraDescription> globalCameras = [];

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            await Permission.camera.request();
            try {
              globalCameras = await availableCameras();
            } catch (e) {
              print('Kamera error: $e');
            }
            runApp(const BrokerApp());
          }

          class BrokerApp extends StatelessWidget {
            const BrokerApp({Key? key}) : super(key: key);
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'BRO-KER',
                debugShowCheckedModeBanner: false,
                home: const BrokerMainScreen(),
              );
            }
          }

          class BrokerMainScreen extends StatefulWidget {
            const BrokerMainScreen({Key? key}) : super(key: key);
            @override
            State<BrokerMainScreen> createState() => _BrokerMainScreenState();
          }

          class _BrokerMainScreenState extends State<BrokerMainScreen> {
            CameraController? _cameraController;
            bool _isCameraActive = false;
            List<CameraDescription> backCameras = [];
            int currentLensIndex = 0;

            @override
            void initState() {
              super.initState();
              backCameras = globalCameras.where((c) => c.lensDirection == CameraLensDirection.back).toList();
            }

            Future<void> _initCamera(CameraDescription camera) async {
              if (_cameraController != null) {
                await _cameraController!.dispose();
              }
              _cameraController = CameraController(camera, ResolutionPreset.max, enableAudio: false);
              await _cameraController!.initialize();
              if (mounted) setState(() {});
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.black,
                body: SafeArea(
                  child: Stack(
                    children: [
                      if (_isCameraActive && _cameraController != null && _cameraController!.value.isInitialized)
                        Positioned.fill(
                          child: CameraPreview(_cameraController!),
                        ),
                      Positioned.fill(
                        child: InAppWebView(
                          initialUrlRequest: URLRequest(url: WebUri('https://borobilobrk.github.io/flutter-create-broker_app/')),
                          initialSettings: InAppWebViewSettings(
                            transparentBackground: true,
                            mediaPlaybackRequiresUserGesture: false,
                            allowsInlineMediaPlayback: true,
                            javaScriptEnabled: true,
                          ),
                          onWebViewCreated: (controller) {
                            controller.addJavaScriptHandler(handlerName: 'FlutterKamera', callback: (args) async {
                              String akcija = args[0];
                              if (akcija == 'pokreni') {
                                if (backCameras.isNotEmpty) {
                                  await _initCamera(backCameras[currentLensIndex]);
                                  setState(() { _isCameraActive = true; });
                                  return backCameras.length.toString();
                                }
                                return "0";
                              } else if (akcija == 'cikliraj') {
                                if (backCameras.length > 1) {
                                  currentLensIndex = (currentLensIndex + 1) % backCameras.length;
                                  await _initCamera(backCameras[currentLensIndex]);
                                  return "${currentLensIndex + 1}/${backCameras.length}";
                                }
                                return "Samo 1 leća prepoznata u Native kodu";
                              } else if (akcija == 'ugasi') {
                                setState(() { _isCameraActive = false; });
                                _cameraController?.dispose();
                                _cameraController = null;
                                return "OK";
                              }
                            });
                          },
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF
          
      - name: Izgradnja APK datoteke
        run: flutter build apk --release
        
      - name: Spremanje gotovog APK-a
        uses: actions/upload-artifact@v4
        with:
          name: BRO-KER-App
          path: build/app/outputs/flutter-apk/app-release.apk
          
