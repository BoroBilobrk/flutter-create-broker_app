<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRO-KER | Pametni Keramicarski Alat</title>
    <link rel="stylesheet" href="css/stil.css">
</head>
<body>
    <header class="broker-header" id="glavno-zaglavlje" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--bg-kartica); border-bottom: 1px solid var(--boja-okvira); height: 55px; box-sizing: border-box;">
        <h1 id="naslov-prikaza" style="font-size: 12px; margin: 0; color: var(--tekst-glavni); letter-spacing: 1.5px; text-transform: uppercase;">Glavni Izbornik</h1>
        <img src="logo.png" alt="BRO-KER" style="width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 1px solid var(--boja-okvira);">
    </header>

    <main class="broker-container">
        
        <section id="zaslon-izbornik" class="zaslon">
            <div class="alat-kartica" style="width:100%; margin-bottom: 15px; margin-top: 15px; text-align: left; box-sizing: border-box;">
                <span style="font-size:10px; font-weight:700; color:var(--tekst-sporedni); display:block; margin-bottom:8px; letter-spacing:1px;">IZGLED KORISNIČKOG SUČELJA (TEMA)</span>
                <select id="odabir-teme" style="width:100%; font-weight:bold; color:var(--akcent-plavi); background:var(--bg-input); border:1px solid var(--boja-okvira);" onchange="App.promijeniTemu(this.value)">
                    <option value="stealth">🟢 INDUSTRIAL STEALTH (Neon-Tamni)</option>
                    <option value="architect">🔵 ARCHITECT STUDIO (Minimalistički sivi)</option>
                    <option value="hud">🔮 HUD TACTICAL (Prozirni stakleni)</option>
                </select>
            </div>
            
            <div class="alat-kartica" style="width:100%; margin-bottom: 20px;">
                <span style="font-size:10px; font-weight:700; color:var(--tekst-sporedni); display:block; margin-bottom:10px; letter-spacing:1px;">UPRAVLJANJE PROJEKTNIM NALOZIMA</span>
                <input type="text" id="input-klijent" placeholder="Ime klijenta (npr. Hotel Jadran)" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:12px; margin-bottom:10px;">
                <input type="text" id="input-prostorija" placeholder="Naziv prostorije (npr. Kupaonica Kat 1)" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:12px; margin-bottom:15px;">
                
                <span style="font-size:10px; font-weight:700; color:var(--tekst-sporedni); display:block; margin-bottom:8px; letter-spacing:1px;">OPSEG RADOVA ZA OVU PROSTORIJU:</span>
                <div style="display:flex; gap:8px; margin-bottom:20px;">
                    <label style="flex:1; background:var(--bg-input); border:1px solid var(--boja-okvira); padding:10px 5px; border-radius:4px; color:var(--tekst-glavni); font-size:10px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:6px;">
                        <input type="checkbox" id="conf-zidovi" checked style="width:14px; height:14px; accent-color:var(--akcent-plavi);"> ZIDOVI
                    </label>
                    <label style="flex:1; background:var(--bg-input); border:1px solid var(--boja-okvira); padding:10px 5px; border-radius:4px; color:var(--tekst-glavni); font-size:10px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:6px;">
                        <input type="checkbox" id="conf-pod" checked style="width:14px; height:14px; accent-color:var(--akcent-plavi);"> POD
                    </label>
                    <label style="flex:1; background:var(--bg-input); border:1px solid var(--boja-okvira); padding:10px 5px; border-radius:4px; color:var(--tekst-glavni); font-size:10px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:6px;">
                        <input type="checkbox" id="conf-sokl" style="width:14px; height:14px; accent-color:var(--akcent-plavi);"> COKL
                    </label>
                </div>

                <span style="font-size:10px; font-weight:700; color:var(--tekst-sporedni); display:block; margin-bottom:8px; letter-spacing:1px;">OSNOVNI FORMAT KERAMIKE</span>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <div style="flex:1;">
                        <label style="font-size:9px; color:var(--tekst-sporedni); font-weight:bold; display:block; margin-bottom:4px;">DULJINA (cm)</label>
                        <input type="number" id="init-plocica-w" value="120" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:10px; font-weight:bold; text-align:center;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:9px; color:var(--tekst-sporedni); font-weight:bold; display:block; margin-bottom:4px;">ŠIRINA (cm)</label>
                        <input type="number" id="init-plocica-h" value="60" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:10px; font-weight:bold; text-align:center;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:9px; color:var(--tekst-sporedni); font-weight:bold; display:block; margin-bottom:4px;">FUGA (mm)</label>
                        <input type="number" id="init-fuga" value="2" step="0.5" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:10px; font-weight:bold; text-align:center;">
                    </div>
                </div>

                <button class="gumb-ostri gumb-potvrda" style="margin-bottom: 10px;" onclick="App.kreirajNoviProjekt('kamera')">
                    <span class="gumb-ikona">📷</span> POKRENI AR LIVE SKENIRANJE
                </button>
                <button class="gumb-ostri" style="margin:0;" onclick="App.kreirajNoviProjekt('rucno')">
                    <span class="gumb-ikona">📐</span> RUČNI RADNI PROSTOR
                </button>
            </div>

            <div id="lista-projekata" style="width:100%; display:flex; flex-direction:column; gap:8px;"></div>
        </section>

        <section id="zaslon-radni" class="zaslon">
            <div style="width:100%; margin-bottom: 12px;">
                <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold; display:block; margin-bottom:4px;">AKTIVNA POVRŠINA ZA OBRADU</label>
                <select id="odabir-povrsine" style="width:100%; background:var(--bg-kartica); border:1px solid var(--boja-okvira); color:var(--akcent-plavi); padding:12px; font-weight:bold; font-size:13px; letter-spacing:1px;" onchange="App.promijeniAktivnuPovrsinu(this.value)"></select>
            </div>

            <div class="alat-kartica" style="width:100%; margin-bottom: 8px;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div style="flex:1;">
                        <label id="label-dim-w" style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold;">ŠIRINA PROSTORA (cm)</label>
                        <input type="number" id="input-zid-w" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                    </div>
                    <div style="flex:1;" id="kontejner-visina-zida">
                        <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold;">VISINA STROPA (cm)</label>
                        <input type="number" id="input-zid-h" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                    </div>
                </div>
                
                <div id="sekcija-visina-oblaganja" style="display:flex; align-items:center; gap:10px; border-top:1px solid var(--boja-okvira); padding-top:10px; margin-top:5px;">
                    <div style="flex:1;">
                        <label style="font-size:10px; color:var(--akcent-plavi); font-weight:bold;">VISINA OBLAGANJA (cm)</label>
                        <input type="number" id="input-oblaganje-h" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                    </div>
                </div>

                <div id="sekcija-pod-opcije" style="display:none; align-items:center; border-top:1px solid var(--boja-okvira); padding-top:10px; margin-top:5px;">
                    <label style="background:var(--bg-input); border:1px solid var(--boja-okvira); padding:8px; border-radius:4px; color:var(--akcent-plavi); font-size:10px; font-weight:bold; display:flex; align-items:center; justify-content:center; gap:6px; cursor:pointer;">
                        <input type="checkbox" id="chk-rotacija" style="width:14px; height:14px; accent-color:var(--akcent-plavi);" onchange="App.toggleRotacija(this.checked)"> OSLONAC PLOČICE (ROTACIJA 90°)
                    </label>
                </div>
            </div>

            <div id="sekcija-format-plocice" class="alat-kartica" style="width:100%; margin-bottom: 8px;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div style="flex:1;">
                        <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold;">DULJINA (cm)</label>
                        <input type="number" id="input-plocica-w" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold;">ŠIRINA (cm)</label>
                        <input type="number" id="input-plocica-h" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold;">FUGA (mm)</label>
                        <input type="number" id="input-fuga" step="0.5" style="width:100%; background:var(--bg-input); border:1px solid var(--boja-okvira); color:var(--tekst-glavni); padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                    </div>
                </div>
                
                <div style="display:flex; gap:8px; border-top:1px solid var(--boja-okvira); padding-top:10px; margin-top:5px; align-items:center; justify-content:space-between;">
                    <span id="naziv-teksture-status" style="font-size:10px; font-weight:bold; color:var(--tekst-sporedni);">Zid: Nema teksture</span>
                    <div style="display:flex; gap:5px;">
                        <button id="gumb-brisi-teksturu" class="gumb-ostri gumb-kontra" style="margin:0; padding:8px 10px; font-size:10px; display:none;" onclick="App.ukloniTeksturuPlocice()">✕</button>
                        <button class="gumb-ostri gumb-potvrda" style="margin:0; padding:8px 12px; font-size:10px;" onclick="document.getElementById('foto-tekstura').click()">📷 ZID/POD</button>
                    </div>
                    <input type="file" id="foto-tekstura" accept="image/*" style="display:none;" onchange="App.ucitajTeksturuPlocice(this)">
                </div>

                <div id="sekcija-tekstura-tusa" style="display:flex; gap:8px; border-top:1px dashed var(--boja-okvira); padding-top:10px; margin-top:10px; align-items:center; justify-content:space-between;">
                    <span id="naziv-teksture-tusa-status" style="font-size:10px; font-weight:bold; color:var(--tekst-sporedni);">Tuš: Nema teksture</span>
                    <div style="display:flex; gap:5px;">
                        <button id="gumb-brisi-teksturu-tusa" class="gumb-ostri gumb-kontra" style="margin:0; padding:8px 10px; font-size:10px; display:none;" onclick="App.ukloniTeksturuTusa()">✕</button>
                        <button class="gumb-ostri" style="margin:0; padding:8px 12px; font-size:10px; background:rgba(14,165,233,0.1); border-color:var(--akcent-plavi); color:var(--akcent-plavi);" onclick="document.getElementById('foto-tekstura-tusa').click()">📷 DEKOR TUŠA</button>
                    </div>
                    <input type="file" id="foto-tekstura-tusa" accept="image/*" style="display:none;" onchange="App.ucitajTeksturuTusa(this)">
                </div>
            </div>

            <div id="sekcija-pomicanje-rastera" class="alat-kartica" style="width:100%; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px;">
                <div>
                    <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold; letter-spacing:1px; display:block; margin-bottom:4px;">HORIZONTALNO PORAVNANJE (X-os)</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="range" id="slider-odmak-x" min="0" max="120" value="0" step="0.5" style="flex:1; accent-color:var(--akcent-plavi); height:6px;" oninput="App.promijeniOdmakX(this.value)">
                        <span id="prikaz-odmaka-x" style="font-size:11px; font-weight:bold; color:var(--akcent-plavi); min-width:50px; text-align:right;">0.0 cm</span>
                    </div>
                </div>
                <div>
                    <label style="font-size:10px; color:var(--tekst-sporedni); font-weight:bold; letter-spacing:1px; display:block; margin-bottom:4px;">VERTIKALNO PORAVNANJE (Y-os)</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="range" id="slider-odmak-y" min="0" max="120" value="0" step="0.5" style="flex:1; accent-color:var(--akcent-plavi); height:6px;" oninput="App.promijeniOdmakY(this.value)">
                        <span id="prikaz-odmaka-y" style="font-size:11px; font-weight:bold; color:var(--akcent-plavi); min-width:50px; text-align:right;">0.0 cm</span>
                    </div>
                </div>
            </div>

            <div class="canvas-prostor">
                <div id="mreza-zida" class="zid-mreza-kontejner"></div>
            </div>

            <button id="gumb-dodaj-otvor" class="gumb-ostri gumb-potvrda" style="margin-bottom: 10px;" onclick="MatematikaEngine.prikaziDijalogZaOtvor()">
                ➕ DODAJ OTVOR / TUŠ ZONU
            </button>
            <button class="gumb-ostri" style="margin-bottom: 20px; border-color: var(--akcent-zeleni); color: var(--akcent-zeleni);" onclick="App.spasiTrenutnoStanjeUBazu()">
                💾 SPREMI ZASLON U PROJEKT
            </button>

            <div class="kontrole-radne">
                <button class="gumb-ostri gumb-sekundarni" onclick="App.promijeniZaslon('zaslon-izbornik')">ZATVORI</button>
                <button class="gumb-ostri gumb-zeleni" onclick="App.otvoriDokumentaciju()">ZBIRNI TROŠKOVNIK (PDF)</button>
            </div>
        </section>
    </main>
    <section id="zaslon-kamera" style="display:none;"></section>
    
    <script src="js/baza.js"></script>
    <script src="js/matematika.js"></script>
    <script src="js/kamera.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
