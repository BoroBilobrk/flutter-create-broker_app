<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRO-KER | Pametni Keramicarski Alat</title>
    <link rel="stylesheet" href="css/stil.css">
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <header class="broker-header">
        <div class="mini-logo">
            <img src="logo.png" alt="BRO-KER" class="header-logo-img">
            <span>BRO-KER</span>
        </div>
        <h1 id="naslov-prikaza">Glavni Izbornik</h1>
    </header>

    <main class="broker-container">
        
        <section id="zaslon-izbornik" class="zaslon aktivni-zaslon">
            <div class="logo-kontejner" style="margin: 25px 0 15px 0;">
                <img src="logo.png" alt="BRO-KER" class="glavni-logo-img" style="width:120px; height:120px;">
                <p class="logo-podnaslov">AUGMENTED REALITY COATING SYSTEM</p>
            </div>
            
            <div class="alat-kartica" style="width:100%; margin-bottom: 20px;">
                <span style="font-size:10px; font-weight:700; color:#6C7A84; display:block; margin-bottom:10px; letter-spacing:1px;">OTVORI NOVI PROJEKTNI NALOG</span>
                <input type="text" id="input-klijent" placeholder="Ime klijenta / Lokacija" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:12px; margin-bottom:10px;">
                <input type="text" id="input-prostorija" placeholder="Prostorija (npr. Kupaonica prizemlje)" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:12px; margin-bottom:15px;">
                
                <span style="font-size:10px; font-weight:700; color:#6C7A84; display:block; margin-bottom:8px; letter-spacing:1px;">DIMENZIJE KERAMIKE ZA OVAJ PROSTOR</span>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <div style="flex:1;">
                        <label style="font-size:9px; color:#6C7A84; font-weight:bold; display:block; margin-bottom:4px;">DULJINA (cm)</label>
                        <input type="number" id="init-plocica-w" value="120" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:10px; font-weight:bold; text-align:center;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:9px; color:#6C7A84; font-weight:bold; display:block; margin-bottom:4px;">SIRINA (cm)</label>
                        <input type="number" id="init-plocica-h" value="60" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:10px; font-weight:bold; text-align:center;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:9px; color:#6C7A84; font-weight:bold; display:block; margin-bottom:4px;">FUGA (mm)</label>
                        <input type="number" id="init-fuga" value="2" step="0.5" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:10px; font-weight:bold; text-align:center;">
                    </div>
                </div>

                <button class="gumb-ostri gumb-potvrda" style="margin-bottom: 10px;" onclick="App.kreirajNoviProjekt('kamera')">
                    <span class="gumb-ikona">📷</span> POKRENI AR LIVE SKENIRANJE
                </button>
                <button class="gumb-ostri" style="margin:0; background-color:#161A1D;" onclick="App.kreirajNoviProjekt('rucno')">
                    <span class="gumb-ikona">📐</span> RUČNI RADNI PROSTOR
                </button>
            </div>

            <div style="width:100%; text-align:left; margin-bottom:10px;">
                <span style="font-size:10px; font-weight:700; color:#6C7A84; letter-spacing:1px;">SPREMLJENI PROJEKTI NA MOBITELU</span>
            </div>
            <div id="lista-projekata" style="width:100%; display:flex; flex-direction:column; gap:8px;"></div>
        </section>

        <section id="zaslon-radni" class="zaslon">
            
            <div style="width:100%; margin-bottom: 12px;">
                <label style="font-size:10px; color:#6C7A84; font-weight:bold; display:block; margin-bottom:4px;">AKTIVNA POVRŠINA ZA OBRADU</label>
                <select id="odabir-povrsine" style="width:100%; background:#161A1D; border:1px solid #343D44; color:#4EFA9E; padding:12px; font-weight:bold; font-size:13px; letter-spacing:1px;" onchange="App.promijeniAktivnuPovrsinu(this.value)">
                    <option value="zid1">ZID 1 (Prednji / Glavni)</option>
                    <option value="zid2">ZID 2 (Desni)</option>
                    <option value="zid3">ZID 3 (Stražnji)</option>
                    <option value="zid4">ZID 4 (Lijevi)</option>
                    <option value="pod">POD KUPAONICE</option>
                    <option value="sokl">SOKL / RUBNI REZOVI</option>
                </select>
            </div>

            <div class="alat-kartica" style="width:100%; margin-bottom: 8px; display: flex; gap: 10px;">
                <div style="flex:1;">
                    <label id="label-dim-w" style="font-size:10px; color:#6C7A84; font-weight:bold;">ŠIRINA ZIDA (cm)</label>
                    <input type="number" id="input-zid-w" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                </div>
                <div style="flex:1;">
                    <label id="label-dim-h" style="font-size:10px; color:#6C7A84; font-weight:bold;">VISINA ZIDA (cm)</label>
                    <input type="number" id="input-zid-h" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                </div>
            </div>

            <div id="sekcija-format-plocice" class="alat-kartica" style="width:100%; margin-bottom: 8px; display: flex; gap: 10px;">
                <div style="flex:1;">
                    <label style="font-size:10px; color:#6C7A84; font-weight:bold;">DULJINA (cm)</label>
                    <input type="number" id="input-plocica-w" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                </div>
                <div style="flex:1;">
                    <label style="font-size:10px; color:#6C7A84; font-weight:bold;">ŠIRINA (cm)</label>
                    <input type="number" id="input-plocica-h" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                </div>
                <div style="flex:1;">
                    <label style="font-size:10px; color:#6C7A84; font-weight:bold;">FUGA (mm)</label>
                    <input type="number" id="input-fuga" step="0.5" style="width:100%; background:#0A0C0E; border:1px solid #22282C; color:#FFF; padding:8px; font-weight:bold;" onchange="App.sacuvajPoljaUObjekt()">
                </div>
            </div>

            <div id="sekcija-pomicanje-rastera" class="alat-kartica" style="width:100%; margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size:10px; color:#6C7A84; font-weight:bold; letter-spacing:1px;">RUČNO PORAVNANJE MREŽE</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button class="gumb-ostri" style="margin:0; padding:10px; width:45px; background:#161A1D;" onclick="MatematikaEngine.nudgeRaster(-0.5)">◀</button>
                    <input type="range" id="slider-odmak-x" min="0" max="60" value="0" step="0.5" style="flex:1; accent-color:#4EFA9E; height:6px; cursor:pointer;" oninput="MatematikaEngine.postaviOdmakX(this.value)">
                    <button class="gumb-ostri" style="margin:0; padding:10px; width:45px; background:#161A1D;" onclick="MatematikaEngine.nudgeRaster(0.5)">▶</button>
                    <span id="prikaz-odmaka" style="font-size:11px; font-weight:bold; color:#4EFA9E; min-width:45px; text-align:right;">0.0 cm</span>
                </div>
            </div>

            <div class="canvas-prostor">
                <div id="mreza-zida" class="zid-mreza-kontejner"></div>
            </div>
            
            <div id="sekcija-zona" class="nadzorna-ploca">
                <div class="alat-kartica">
                    <label class="prekidac-kontejner">
                        <span class="prekidac-tekst">Visinska Zona</span>
                        <input type="checkbox" id="check-visina" onchange="App.sacuvajPoljaUObjekt()">
                        <span class="kvadratni-prekidac"></span>
                    </label>
                </div>
                <div class="alat-kartica">
                    <label class="prekidac-kontejner">
                        <span class="prekidac-tekst">Traka za Tus</span>
                        <input type="checkbox" id="check-tus" onchange="App.sacuvajPoljaUObjekt()">
                        <span class="kvadratni-prekidac"></span>
                    </label>
                </div>
            </div>

            <button id="gumb-dodaj-otvor" class="gumb-ostri gumb-potvrda" style="margin-bottom: 10px;" onclick="MatematikaEngine.prikaziDijalogZaOtvor()">
                ➕ DODAJ OTVOR / KRUNU MANUELNO
            </button>
            <button class="gumb-ostri" style="margin-bottom: 20px; background-color: #1A221D; border-color: #2E5C38; color: #4EFA9E;" onclick="App.spasiTrenutnoStanjeUBazu()">
                💾 SPREMI PROJEKT U MEMORIJU
            </button>

            <div class="kontrole-radne">
                <button class="gumb-ostri gumb-sekundarni" onclick="App.promijeniZaslon('zaslon-izbornik')">ZATVORI</button>
                <button class="gumb-ostri gumb-zeleni" onclick="App.otvoriDokumentaciju()">ZBIRNI TROŠKOVNIK (PDF)</button>
            </div>
        </section>

    </main>

    <section id="zaslon-kamera" style="position:fixed !important; top:0 !important; left:0 !important; width:100vw !important; height:100vh !important; background:#000000 !important; z-index:9999999 !important; display:none; box-sizing:border-box !important;">
        <video id="web-kamera" autoplay playsinline style="width:100% !important; height:100% !important; object-fit:cover !important; position:absolute !important; top:0 !important; left:0 !important; z-index: 10 !important;"></video>
        <canvas id="aruco-canvas" style="width:100% !important; height:100% !important; object-fit:cover !important; position:absolute !important; top:0 !important; left:0 !important; pointer-events:none !important; z-index: 20 !important;"></canvas>
        
        <div id="kamera-status" style="position:absolute !important; top:20px !important; left:5% !important; width:90% !important; background:rgba(10,12,14,0.93) !important; border:1px solid #343D44 !important; color:#FFF !important; padding:12px !important; font-size:11px !important; font-weight:bold !important; text-align:center !important; box-sizing:border-box !important; z-index:30 !important;">Inicijalizacija straznjih leca...</div>
        
        <div style="position:absolute !important; bottom:90px !important; left:5% !important; width:90% !important; display:flex !important; flex-direction:column !important; gap:10px !important; box-sizing:border-box !important; z-index:10000000 !important; pointer-events: auto !important;">
            <button class="gumb-ostri" style="margin:0; width:100%; background:rgba(31,42,51,0.96); border-color:#34495C; color:#FFF; font-weight:bold; padding:14px;" onclick="Kamera.ciklirajLecu()">
                🔄 PROMIJENI LEĆU (0.5x ŠIROKOKUTNA / 1x COATED)
            </button>
            <div style="display:flex !important; gap:10px !important; width:100% !important;">
                <button class="gumb-ostri gumb-kontra" style="margin:0; flex:1; padding:14px;" onclick="Kamera.zaustavi()">PREKINI</button>
                <button class="gumb-ostri gumb-potvrda" style="margin:0; flex:2; padding:14px;" onclick="Kamera.uhvatiMjere()">ZAKLJUČAJ AR RASTER I RUPE</button>
            </div>
        </div>
    </section>

    <script src="js/baza.js"></script>
    <script src="js/matematika.js"></script>
    <script src="js/kamera.js"></script>
    <script src="js/aruco.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
