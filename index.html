<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRO-KER | Pametni Keramičarski Alat</title>
    <link rel="stylesheet" href="css/stil.css">
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
</head>
<body>

    <header class="broker-header">
        <div class="mini-logo">
            <img src="logo.png" alt="BRO-KER" class="header-logo-img">
            <span>BRO-KER</span>
        </div>
        <h1 id="naslov-prikaza">Glavni Izbornik</h1>
    </header>

    <main class="broker-container">
        
        <section id="zaslon-izbornik" class="zaslon aktivni-zaslon">
            <div class="logo-kontejner">
                <img src="logo.png" alt="BRO-KER Vizualni Identitet" class="glavni-logo-img">
                <p class="logo-podnaslov">CRAFT FOR TILING AND FLOOR COVERINGS</p>
            </div>
            
            <div class="izbornik-akcije">
                <button class="gumb-ostri" onclick="App.promijeniZaslon('zaslon-kamera')">
                    <span class="gumb-ikona">📷</span> ZAPOČNI AUTOMATSKO SKENIRANJE
                </button>
                <button class="gumb-ostri gumb-sekundarni" onclick="App.promijeniZaslon('zaslon-radni')">
                    <span class="gumb-ikona">📐</span> RUČNI RADNI PROSTOR
                </button>
            </div>
        </section>

        <section id="zaslon-kamera" class="zaslon">
            <div class="video-okvir">
                <video id="web-kamera" autoplay playsinline></video>
                <canvas id="aruco-canvas"></canvas>
                <div class="nstatus" id="kamera-status">Inicijalizacija kamere...</div>
            </div>
            <div class="kontrole-kamere">
                <button class="gumb-ostri gumb-kontra" onclick="Kamera.zaustavi()">PREKINI</button>
                <button class="gumb-ostri gumb-potvrda" onclick="Kamera.uhvatiMjere()">ZAKLJUČAJ AUTOMATSKE MJERE</button>
            </div>
        </section>

        <section id="zaslon-radni" class="zaslon">
            <div class="canvas-prostor">
                <div id="mreza-zida" class="zid-mreza-kontejner">
                    </div>
            </div>
            
            <div class="nadzorna-ploca">
                <div class="alat-kartica">
                    <label class="prekidac-kontejner">
                        <span class="prekidac-tekst">Visinska Zona (90cm)</span>
                        <input type="checkbox" id="check-visina" onchange="MatematikaEngine.toggleVisina(this.checked)">
                        <span class="kvadratni-prekidac"></span>
                    </label>
                </div>
                <div class="alat-kartica">
                    <label class="prekidac-kontejner">
                        <span class="prekidac-tekst">Traka za Tuš (Okomita)</span>
                        <input type="checkbox" id="check-tus" onchange="MatematikaEngine.toggleTus(this.checked)">
                        <span class="kvadratni-prekidac"></span>
                    </label>
                </div>
            </div>

            <div class="kontrole-radne">
                <button class="gumb-ostri gumb-sekundarni" onclick="App.promijeniZaslon('zaslon-izbornik')">NAZAD</button>
                <button class="gumb-ostri gumb-zeleni" onclick="App.otvoriDokumentaciju()">DOKUMENTACIJA / PDF</button>
            </div>
        </section>

    </main>

    <script src="js/matematika.js"></script>
    <script src="js/kamera.js"></script>
    <script src="js/aruco.js"></script>
    <script src="js/dokumentacija.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
